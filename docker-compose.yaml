services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    logging:
      options:
        max-size: "50m"
        max-file: "3"
    command:
      - --log.level=INFO
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      # Only route containers with traefik.enable=true.
      - --providers.docker.exposedbydefault=false
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.watch=true
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
    networks:
      - docker_net

  api:
    container_name: api
    logging:
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - FIRECRAWL_API_KEY={SET IN DOCKER-COMPOSE.OVERRIDE.YAML}
      - ANTHROPIC_API_KEY={SET IN DOCKER-COMPOSE.OVERRIDE.YAML}
      - API_KEY={SET IN DOCKER-COMPOSE.OVERRIDE.YAML}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=80"
    build:
      context: .
      dockerfile: ./backend/api/Dockerfile.local
    volumes:
      - "./backend/api/app:/app/app"
    networks:
      - docker_net

networks:
  docker_net:
    name: docker_net
    driver: bridge
